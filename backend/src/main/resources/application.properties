# Server Config
server.port=8083

# Database Config (H2 File-based Database)
spring.datasource.url=jdbc:h2:file:./data/livio_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Config
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database Config (MySQL Backup - commented out)
# spring.datasource.url=jdbc:mysql://localhost:3306/livio_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=rootpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Config
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Spring Security / Security config placeholders
app.jwt.secret=PlaceholderSecretKeyMustBeAtLeast256BitsLongForHS256SigningKey
app.jwt.expiration-ms=86400000

# Logging config
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
