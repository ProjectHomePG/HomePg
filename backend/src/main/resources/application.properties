# Server Config
server.port=8080

# Database Config (MySQL Placeholder)
spring.datasource.url=jdbc:mysql://localhost:3306/pgnearme_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring Security / Security config placeholders
app.jwt.secret=PlaceholderSecretKeyMustBeAtLeast256BitsLongForHS256SigningKey
app.jwt.expiration-ms=86400000

# Logging config
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
