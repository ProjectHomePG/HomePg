# Server Config
server.port=8082

# Database Config (H2 In-Memory - Default for easy startup)
spring.datasource.url=jdbc:h2:mem:pgnearme_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Database Config (MySQL - Uncomment to use)
# spring.datasource.url=jdbc:mysql://localhost:3306/pgnearme_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=rootpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Security / Security config placeholders
app.jwt.secret=PlaceholderSecretKeyMustBeAtLeast256BitsLongForHS256SigningKey
app.jwt.expiration-ms=86400000

# Logging config
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
