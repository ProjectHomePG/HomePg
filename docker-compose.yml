version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: livio-backend
    ports:
      - "8083:8083"
    volumes:
      # Map the data folder on the host machine to keep database data persistent
      - ./backend/data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:file:./data/livio_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: livio-frontend
    ports:
      - "8082:8082"
    environment:
      # Browser-facing API endpoint URL targeting the host port
      - NEXT_PUBLIC_API_URL=http://localhost:8083/api
    depends_on:
      - backend
    restart: unless-stopped
